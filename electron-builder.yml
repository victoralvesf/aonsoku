appId: com.pabm.radiopabm
productName: radioPABM
copyright: Copyright © 2025 Victor Alves
icon: ./build/icon.ico
artifactName: '${productName}-v${version}-${os}-${arch}.${ext}'

directories:
  buildResources: build

files:
  - '!**/*'
  - 'out/**'
  - 'package.json'

extraResources:
  - from: resources
    to: resources

win:
  executableName: radioPABM
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  shortcutName: ${productName}
  oneClick: false
  allowToChangeInstallationDirectory: true
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  license: ./LICENSE.txt
  uninstallerIcon: ./build/icon.ico

mac:
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  icon: ./build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - AppImage
    - deb
    - tar.gz
  maintainer: npc-riddlah
  category: AudioVideo
  synopsis: 'radopPABM Client build atop of Aonsoku'

npmRebuild: true
nativeRebuilder: legacy

publish:
  provider: github
  owner: npc-riddlah
  repo: aonsoku
